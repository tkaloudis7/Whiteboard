<body>

  <div class="container-fluid">

      <img src="img/whiteboard_logo.png" alt="Logo" width="50" height="50" class="d-inline-block align-text-top">
      Whiteboard
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

      </li>
    </div>

<br><br>
<div align="center">
  <h1>My Tasks</h1>

  <br>

  <div class="card shadow-sm p-4 mb-5 border-0 bg-body-tertiary text-start container">
    <form id="taskForm" class="row g-3 align-items-end">
      <div class="col-md-5">
        <label for="taskName" class="form-label fw-bold">Task Name:</label>
        <input type="text" id="taskName" class="form-control" placeholder="Enter task..." maxlength="70">
      </div>
      <div class="col-md-3">
        <label for="taskDate" class="form-label fw-bold">Date:</label>
        <input type="date" id="taskDate" class="form-control">
      </div>
      <div class="col-md-2">
        <label for="taskPriority" class="form-label fw-bold">Priority:</label>
        <select id="taskPriority" class="form-select">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="col-md-2">
        <button type="button" id="addTaskBtn" class="btn btn-primary w-100 fw-bold">Add Task</button>
      </div>
    </form>
  </div>

  <br><br>

  <div class="container table-responsive shadow-sm rounded">
    <table class="table table-hover align-middle mb-0 text-start">
      <thead class="table-dark">
      <tr>
        <th>Task</th>
        <th>Date</th>
        <th>Priority</th>
        <th>Status</th>
        <th class="text-center">Action</th>
      </tr>
      </thead>
      <tbody id="taskTableBody">
      </tbody>
    </table>
  </div>

<br><br>

  <footer class="bg-dark text-light py-4 mt-auto">
    <div class="container text-center">
      <div class="row align-items-center">

        <div class="col-md-4 mb-3 mb-md-0">
          <img src="img/whiteboard_logo.png" alt="Whiteboard Logo" width="50" height="50" class="me-2 align-middle">
          <span>&copy; 2026 Whiteboard. All rights reserved.</span>
        </div>

        <div class="col-md-4 mb-3 mb-md-0">
          <a href="mailto:support@whiteboard.com" class="text-light text-decoration-none">support@whiteboard.com</a>
        </div>

        <div class="col-md-4">
          <a href="https://facebook.com" target="_blank" class="text-light me-3 text-decoration-none">Facebook</a>
          <a href="https://instagram.com" target="_blank" class="text-light me-3 text-decoration-none">Instagram</a>
          <a href="https://linkedin.com" target="_blank" class="text-light text-decoration-none">Linkedin</a>
        </div>

      </div>
    </div>
  </footer>
</div>
</body>
