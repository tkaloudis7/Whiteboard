<div class="container mt-5 mb-5 flex-grow-1">
  <h1 class="text-center mb-4">Contact Us</h1>
  <p class="text-center text-muted mb-5">Please fill out the form below to get in touch with our team.</p>

  <div class="row">

    <div class="col-md-6 mb-4">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form id="contactForm">
            <div class="mb-3">
              <label for="fullname" class="form-label fw-bold">Name:</label>
              <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Enter your full name" required maxlength="30">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Email:</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="mb-3">
              <label for="subject" class="form-label fw-bold">Subject:</label>
              <select class="form-select" id="subject" name="subject">
                <option value="general">General Inquiry</option>
                <option value="support">Technical Support</option>
                <option value="feedback">Feedback</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="message" class="form-label fw-bold">Message:</label>
              <textarea class="form-control" id="message" name="message" rows="5" placeholder="How can we help you?" required maxlength="300"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit Form</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body p-4">
          <h3 class="mb-3">Our Office</h3>
          <p class="text-muted">Gravias 6, Agia Paraskevi, 153 42</p>

          <br>
          <div class="ratio ratio-16x9 mb-4">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12575.48155556221!2d23.81205835214406!3d38.003483558157!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14a199a35bada0c7%3A0x18b8d1e8b210674c!2zzpPPgc6xzrLOuc6sz4IgNiwgzpHOsy4gzqDOsc-BzrHPg866zrXPhc6uIDE1MyA0Mg!5e0!3m2!1sel!2sgr!4v1771421380218!5m2!1sel!2sgr" style="border:0;"></iframe>
          </div>
        </div>
      </div>
    </div>

  </div> </div> <footer class="bg-dark text-light py-4 mt-auto">
