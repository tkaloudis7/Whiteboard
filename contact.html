<div align="center">
  <h1>Contact Us</h1>
  <p>Please fill out the form below to get in touch with our team.</p>

  <form>
    <table border="0" cellpadding="10" bgcolor="#eeeeee">
      <tr>
        <td align="right">Name:</td>
        <td><input type="text" name="fullname" required maxlength="30"></td>
      </tr>
      <tr>
        <td align="right">Email:</td>
        <td><input type="email" name="email" required></td>
      </tr>
      <tr>
        <td align="right">Subject:</td>
        <td>
          <select name="subject">
            <option value="general">General</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
          </select>
        </td>
      </tr>
      <tr>
        <td align="right" valign="top">Message:</td>
        <td>
          <textarea name="message" rows="6" cols="35" required maxlength="300"></textarea>
        </td>
      </tr>
      <tr>
        <td></td>
        <td>
          <input type="submit" value="Submit Form">
        </td>
      </tr>
    </table>
  </form>
